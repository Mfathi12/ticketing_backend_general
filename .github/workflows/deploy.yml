name: Deploy to Production

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
          
      - name: Deploy to Contabo VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 185.190.142.44
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          command_timeout: 30m
          script: |
            cd /root/ticketing_backend_general || exit 1
            git fetch origin main
            git reset --hard origin/main
            git clean -fd -e .env -e upload
            npm ci --production
            pm2 reload ticket --update-env || pm2 start ecosystem.config.js
            pm2 save
            sleep 5
            pm2 status
            echo "✅ Deployment complete!"
